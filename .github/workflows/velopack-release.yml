name: Release

on:
  push:
    branches:
      - 'release/**'

permissions:
  # 通常は contents: read (R2 単独配信)。
  # ⚠️ 踏み台 publish (移行作業時の 1 回限り) のため一時的に write に上げている。
  # 踏み台 publish 完了後は contents: read に戻して github-release job も削除すること。
  contents: write

# Codex P1 指摘対応 (Lhamiel から踏襲): 複数の release/** push が overlap した場合、
# 古い run の cleanup step (manifest 外を削除) が、新しい run がアップロードしたばかりの
# nupkg を「manifest 外」として削除してしまう race condition がある。
# - group=release-r2: 全リリースで共通の lock
# - cancel-in-progress=false: 走っている run はそのまま終わらせる (キャンセルではなく queue)
concurrency:
  group: release-r2
  cancel-in-progress: false

jobs:
  version:
    name: バージョン取得
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # CodeRabbit #3312176071 対応: 後続ステップで git 認証情報を再利用しない (read-only ジョブのため)
          persist-credentials: false

      - name: バージョン情報を出力
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"

  velopack:
    needs: version
    name: Velopack pack (win-x64)
    runs-on: windows-latest
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # CodeRabbit #3312176071 対応: 後続ステップで git 認証情報を再利用しない (read-only ジョブのため)
          persist-credentials: false

      - name: .NET SDK をセットアップ
        # actions/setup-dotnet@v4.3.1
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '10.0.x'

      # restore と publish のパラメータを完全に一致させる (Codex P1 指摘 #3312152665 対応)。
      # csproj は <SelfContained>false</SelfContained> なので、publish 時のみ
      # --self-contained true で上書きするが、restore 時にも -p:SelfContained=true を
      # 渡しておかないと runtime packs が assets.json に入らず、--no-restore で
      # NETSDK1112 ("publish parameters are different than what's in the project file") が出る。
      - name: 復元 (RID + SelfContained 込み)
        run: dotnet restore src/VStoVSC/VStoVSC.csproj -r win-x64 --force-evaluate -p:SelfContained=true

      # MSBuild.Locator はユーザー側 Visual Studio の MSBuild を動的解決するため
      # SelfContained でも問題なく動く (アプリ本体は self-contained / MSBuild は外部)
      - name: 公開
        run: dotnet publish src/VStoVSC/VStoVSC.csproj -c Release -r win-x64 --self-contained true --no-restore -o publish

      - name: 成果物を確認
        shell: pwsh
        run: |
          $exePath = Join-Path "publish" "VStoVSC.exe"
          if (-not (Test-Path $exePath)) { Write-Error "VStoVSC.exe not found in publish/"; exit 1 }
          Write-Host "VStoVSC.exe を確認完了"

      - name: Velopack CLI をインストール
        # サプライチェーン攻撃防止のため明示的にバージョン固定 (Lhamiel と同一)
        run: dotnet tool install --global vpk --version 0.0.1369-g1d5c984

      - name: Velopack パッケージを作成
        shell: pwsh
        run: |
          $iconPath = Join-Path "src" "VStoVSC" "icon" "app.ico"

          vpk pack `
            --packId VStoVSC `
            --packVersion ${{ needs.version.outputs.version }} `
            --packTitle "VStoVSC" `
            --packAuthors "ゆろち" `
            --mainExe VStoVSC.exe `
            --icon $iconPath `
            --packDir publish `
            --outputDir artifacts `
            --channel win `
            --shortcuts "StartMenu,Desktop"

      - name: Velopack 成果物をアップロード
        # actions/upload-artifact@v4.4.3
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: velopack
          path: artifacts/*
          retention-days: 1

  r2-upload:
    needs: velopack
    name: R2 Upload
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Velopack 成果物をダウンロード
        # actions/download-artifact@v4.1.8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: velopack
          path: packages

      - name: 成果物を確認
        run: |
          echo "パッケージ一覧:"
          ls -lh packages/

      - name: Node.js セットアップ (wrangler 4.x が Node.js >=22 を要求)
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: wrangler CLI をインストール
        # サプライチェーン攻撃防止のため明示的にバージョン固定
        run: npm install -g wrangler@4.92.0

      # Velopack 成果物の R2 アップロード仕様:
      # - releases.win.json (manifest) は同 channel の旧版を上書き
      # - *.nupkg (full / delta) は put のみで既存ファイルは触らない (delta 連鎖と緊急ロールバック維持)
      - name: R2 バケット vs2vsc-updates にアップロード
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          uploaded=0
          for f in packages/*; do
            name=$(basename "$f")
            echo "::group::Upload $name"
            wrangler r2 object put "vs2vsc-updates/$name" --file="$f" --remote
            echo "::endgroup::"
            uploaded=$((uploaded + 1))
          done
          echo "✅ R2 アップロード完了: $uploaded ファイル"

      # Codex #3312267284 対応: 単純な HTTP 200 だけだと CDN/edge が古い manifest を
      # 返している間に cleanup が走り、旧 manifest を取得したクライアントが直後に消える
      # .nupkg を取りに行って 404 失敗する race condition がある。
      # ローカルアップロード済の manifest と完全一致するまでリトライしてから次へ進む。
      - name: 配信確認 (releases.win.json がローカル manifest と一致するまで待機)
        run: |
          set -euo pipefail
          url="https://vs2vsc.nephilim.jp/releases.win.json"
          local_manifest=$(jq -S -c . packages/releases.win.json)
          echo "Local manifest digest: $(echo -n "$local_manifest" | sha256sum | head -c 16)"

          # 最大 90 秒 (18 回 × 5 秒) 待つ。R2 + Cloudflare の伝播は通常 ~10 秒だが余裕を持たせる。
          attempt=0
          max_attempts=18
          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            echo "::group::Attempt $attempt / $max_attempts"
            # Cache-Control ヘッダを bypass するためクエリ文字列でユニーク化
            remote_manifest=$(curl --fail --silent --show-error --max-time 30 \
              -H "Cache-Control: no-cache" \
              "${url}?_=${GITHUB_RUN_ID}-${attempt}" | jq -S -c .)
            echo "Remote manifest digest: $(echo -n "$remote_manifest" | sha256sum | head -c 16)"
            if [ "$local_manifest" = "$remote_manifest" ]; then
              echo "✅ Remote manifest matches local (attempt $attempt)"
              echo "::endgroup::"
              exit 0
            fi
            echo "⚠️ Remote manifest still old, waiting 5s..."
            echo "::endgroup::"
            sleep 5
          done
          echo "::error::Remote manifest did not propagate to match local within $((max_attempts * 5))s. Skipping cleanup to avoid race."
          exit 1

      # 旧バージョン nupkg のクリーンアップ (Aggressive 戦略・Lhamiel から踏襲):
      # - releases.win.json (manifest) に含まれない *.nupkg を削除
      # - Setup.exe / Portable.zip / RELEASES / releases.*.json は固定ファイル名で毎リリース上書きされる Velopack 内部 / ランディング DL 用なので保護
      # - 削除対象を「.nupkg かつ manifest 外」に絞ることで、想定外のファイルを誤削除しない安全側設計
      # - 配信確認ステップ後に走る (manifest 取得不能なら手前で fail し cleanup は走らない)
      # - manifest は ローカル artifact から読込 (Codex P1 race condition 対策)
      - name: 旧バージョン nupkg を削除 (manifest 外をクリーンアップ)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/vs2vsc-updates"
          auth_header="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          # 1. ローカル packages/ の manifest から keep set 構築 (CDN/R2 伝播遅延に依存しない)
          declare -A keep_map
          shopt -s nullglob
          local_manifests=(packages/releases.*.json)
          shopt -u nullglob

          if [[ "${#local_manifests[@]}" -eq 0 ]]; then
            echo "::error::packages/releases.*.json が見つかりません。Velopack 成果物のダウンロードに失敗している可能性があります。"
            exit 1
          fi

          for manifest_path in "${local_manifests[@]}"; do
            echo "Reading local manifest: $manifest_path"
            while IFS= read -r filename; do
              if [[ -n "$filename" && "$filename" != "null" ]]; then
                keep_map["$filename"]=1
              fi
            done < <(jq -r '.Assets[]?.FileName // empty' "$manifest_path")
          done

          echo "::group::manifest 内の保持対象 nupkg (${#keep_map[@]} files)"
          for k in "${!keep_map[@]}"; do echo "  $k"; done | sort
          echo "::endgroup::"

          # 2. R2 上の全 object を cursor ページネーション付きで取得
          all_keys=()
          cursor=""
          while true; do
            if [[ -n "$cursor" ]]; then
              resp=$(curl --fail --silent --max-time 30 "${api}/objects?per_page=1000&cursor=${cursor}" -H "$auth_header")
            else
              resp=$(curl --fail --silent --max-time 30 "${api}/objects?per_page=1000" -H "$auth_header")
            fi
            while IFS= read -r k; do
              [[ -n "$k" ]] && all_keys+=("$k")
            done < <(echo "$resp" | jq -r '.result[]?.key')

            truncated=$(echo "$resp" | jq -r '.result_info.is_truncated // false')
            [[ "$truncated" != "true" ]] && break
            cursor=$(echo "$resp" | jq -r '.result_info.cursor // ""')
            [[ -z "$cursor" || "$cursor" == "null" ]] && break
          done

          echo "::group::R2 内全オブジェクト (${#all_keys[@]} files)"
          printf '  %s\n' "${all_keys[@]}"
          echo "::endgroup::"

          # 3. 削除対象判定: 拡張子 .nupkg のもののみ対象 + keep_map 外
          to_delete=()
          for key in "${all_keys[@]}"; do
            [[ "$key" != *.nupkg ]] && continue
            [[ -n "${keep_map[$key]:-}" ]] && continue
            to_delete+=("$key")
          done

          if [[ "${#to_delete[@]}" -eq 0 ]]; then
            echo "✅ 削除対象なし - R2 上の全 nupkg が manifest に含まれています"
            exit 0
          fi

          echo "::group::削除対象 (${#to_delete[@]} files)"
          printf '  %s\n' "${to_delete[@]}"
          echo "::endgroup::"

          # 4. 一個ずつ DELETE
          deleted=0
          failed=0
          for key in "${to_delete[@]}"; do
            encoded=$(jq -nr --arg k "$key" '$k|@uri')
            resp=$(curl --silent --max-time 30 -X DELETE "${api}/objects/${encoded}" -H "$auth_header")
            success=$(echo "$resp" | jq -r '.success')
            if [[ "$success" == "true" ]]; then
              echo "  🗑️  Deleted: $key"
              deleted=$((deleted + 1))
            else
              echo "  ❌ Failed: $key"
              echo "$resp" | jq -r '.errors[]?.message' | sed 's/^/      /'
              failed=$((failed + 1))
            fi
          done

          echo ""
          echo "🧹 R2 クリーンアップ完了: $deleted / ${#to_delete[@]} 削除  (失敗: $failed)"
          if [[ "$failed" -gt 0 && "$deleted" -eq 0 ]]; then
            echo "::error::すべての削除が失敗しました。API token の権限・bucket 名を確認してください。"
            exit 1
          fi

  # ⚠️ 踏み台 publish 用 (移行作業時の 1 回限り、/transfer-cf Step 11.5)。
  # 旧 GithubSource クライアント (GitHub Releases を見る v2.0.4 以下) が R2 配信へ
  # 自動移行できる「踏み台」を GitHub Releases に 1 個だけ publish する。
  # 踏み台 publish 完了後はこの job 全体を削除して R2 単独配信に戻す。
  github-release-bridge:
    needs: [velopack, version, r2-upload]
    name: GitHub Releases (踏み台 publish)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Velopack 成果物をダウンロード
        # actions/download-artifact@v4.1.8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: velopack
          path: packages

      - name: 成果物を確認
        run: ls -lh packages/

      - name: GitHub Release を作成 + アセットアップロード
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          gh release create "$version" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "VStoVSC $version" \
            --notes "R2 配信への移行用踏み台リリース。旧 GithubSource クライアントはここから取得して R2 配信 (https://vs2vsc.nephilim.jp) へ自動移行されます。以降の通常リリースは R2 単独配信のため、この踏み台は移行作業時の 1 回限りです。"
          for f in packages/*; do
            echo "::group::Upload $(basename "$f")"
            gh release upload "$version" "$f" --repo "${{ github.repository }}"
            echo "::endgroup::"
          done
          echo "✅ 踏み台 publish 完了: $version"
