name: Deploy Landing Page

# web/ 配下のランディングページを Cloudflare Worker としてデプロイする。
# 通常リリース (release/**) の配信パイプラインとは完全に独立しており、
# Velopack 自動更新の配信には影響しない。
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy landing Worker
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # actions/checkout@v4.2.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # zizmor: artipacked 警告対策。チェックアウト後の git 設定に GITHUB_TOKEN を
          # 残さず、後続ステップでの資格情報露出を防ぐ（ここでは push しないので不要）。
          persist-credentials: false

      - name: Node.js セットアップ (wrangler 4.x が Node.js >=20 を要求)
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: wrangler CLI をインストール (サプライチェーン対策でバージョン固定)
        run: npm install -g wrangler@4.93.0

      # CLOUDFLARE_API_TOKEN は Workers Scripts:Edit 権限が必要
      # (r2-upload で使う R2 Storage:Edit だけでは Worker デプロイ不可)。
      - name: Worker をデプロイ
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy
